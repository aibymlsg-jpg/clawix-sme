<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fundraising Goal Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f1a; color: #e0e0e0; min-height: 100vh;
    display: flex; flex-direction: column; justify-content: center;
    align-items: center; padding: 40px 20px; gap: 24px;
  }

  .header { text-align: center; }
  .header h1 { font-size: 22px; color: #fff; }
  .header h1 span { color: #e94560; }
  .header p { color: #888; font-size: 13px; margin-top: 4px; }

  .card {
    background: #1a1a2e; border: 1px solid #2a2a4a;
    border-radius: 12px; padding: 32px; width: 100%; max-width: 420px;
  }

  .control { margin-bottom: 20px; }
  .control label {
    display: flex; justify-content: space-between;
    font-size: 13px; color: #aaa; margin-bottom: 8px;
  }
  .control label .val { color: #e94560; font-weight: 600; }

  input[type="range"] {
    width: 100%; -webkit-appearance: none;
    height: 6px; background: #2a2a4a; border-radius: 3px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    border-radius: 50%; background: #e94560; cursor: pointer;
  }

  .progress-track { background: #2a2a4a; border-radius: 6px; height: 14px; overflow: hidden; margin: 20px 0; }
  .progress-fill { height: 100%; background: #e94560; border-radius: 6px; transition: width 0.25s ease; }

  .result { text-align: center; }
  .pct { font-size: 52px; font-weight: 700; color: #e94560; line-height: 1; }
  .msg { color: #888; font-size: 14px; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1><span>Fundraising</span> Goal Tracker</h1>
  <p>Drag the sliders to update progress</p>
</div>

<div class="card">
  <div class="control">
    <label>Raised (USD) <span class="val" id="raisedVal">6,500</span></label>
    <input type="range" id="raised" min="0" max="100000" step="100" value="6500" oninput="update()">
  </div>

  <div class="control">
    <label>Goal (USD) <span class="val" id="goalVal">10,000</span></label>
    <input type="range" id="goal" min="1000" max="100000" step="1000" value="10000" oninput="update()">
  </div>

  <div class="progress-track">
    <div class="progress-fill" id="fill" style="width:65%"></div>
  </div>

  <div class="result">
    <div class="pct" id="pct">65%</div>
    <div class="msg" id="msg">of goal reached</div>
  </div>
</div>

<script>
function fmt(n) { return Number(n).toLocaleString(); }

function update() {
  var raised = +document.getElementById('raised').value;
  var goal   = +document.getElementById('goal').value;
  var pct    = goal > 0 ? Math.min(100, Math.round((raised / goal) * 100)) : 0;

  document.getElementById('raisedVal').textContent = fmt(raised);
  document.getElementById('goalVal').textContent   = fmt(goal);
  document.getElementById('fill').style.width      = pct + '%';
  document.getElementById('pct').textContent       = pct + '%';
  document.getElementById('msg').textContent       = pct >= 100 ? '🎉 Goal reached!' : 'of goal reached';
}
</script>
</body>
</html>
