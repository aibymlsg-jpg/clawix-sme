services:
  postgres:
    image: postgres:16-alpine
    container_name: clawix-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: clawix
      POSTGRES_PASSWORD: clawix_dev
      POSTGRES_DB: clawix
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U clawix']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - clawix-internal

  redis:
    image: redis:7-alpine
    container_name: clawix-redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - clawix-internal

  api-server:
    image: node:22-slim
    container_name: clawix-api
    env_file: .env
    working_dir: /app
    ports:
      - '3001:3001'
    # Reach a Google Workspace MCP sidecar running on the host (uvx, port 8000)
    # as http://host.docker.internal:8000 (paired with MCP_INTERNAL_ALLOWLIST).
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
      - ./skills:/app/skills
      - ./infra/templates:/app/infra/templates:ro
      - ./packages/api/src:/app/packages/api/src
      - ./packages/api/prisma:/app/packages/api/prisma
      - ./packages/api/prisma.config.ts:/app/packages/api/prisma.config.ts
      - ./packages/api/package.json:/app/packages/api/package.json
      - ./packages/api/tsconfig.json:/app/packages/api/tsconfig.json
      - ./packages/api/nest-cli.json:/app/packages/api/nest-cli.json
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/shared/package.json:/app/packages/shared/package.json
      - ./packages/shared/tsconfig.json:/app/packages/shared/tsconfig.json
      - ./package.json:/app/package.json
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - api_node_modules:/app/node_modules
      - api_pkg_node_modules:/app/packages/api/node_modules
      - shared_pkg_node_modules:/app/packages/shared/node_modules
    environment:
      DATABASE_URL: postgresql://clawix:clawix_dev@postgres:5432/clawix?schema=public
      REDIS_URL: redis://redis:6379
      PORT: '3001'
      HOST: '0.0.0.0'
      NODE_ENV: development
      LOG_LEVEL: debug
      JWT_SECRET: change-me-in-production
      BCRYPT_SALT_ROUNDS: '12'
      TEMPLATES_DIR: /app/infra/templates
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      WORKSPACE_BASE_PATH: /data
      WORKSPACE_HOST_BASE_PATH: ${CLAWIX_HOST_DATA_DIR:-${PWD}/data}
      SKILLS_BUILTIN_DIR: /app/skills/builtin
      SKILLS_BUILTIN_HOST_DIR: ${CLAWIX_HOST_SKILLS_DIR:-${PWD}/skills/builtin}
      SKILLS_CUSTOM_DIR: /app/skills/custom
      SKILLS_CUSTOM_HOST_DIR: ${CLAWIX_HOST_SKILLS_DIR:-${PWD}/skills/custom}
      SKILLS_PACKS_DIR: /app/skills/packs
      # Public memory lives under the persistent /data bind mount so it
      # survives `docker compose down` and image rebuilds.
      # ---- MCP OAuth (set when using authType=oauth MCP servers) ----
      MCP_OAUTH_CALLBACK_URL: http://localhost:3001/mcp/oauth/callback
      WEB_BASE_URL: http://localhost:3000
      # Google Workspace MCP sidecar runs on the HOST (uvx, port 8000), reached
      # from this container via host.docker.internal (see extra_hosts below).
      MCP_INTERNAL_ALLOWLIST: host.docker.internal:8000
    command: >
      sh -c "apt-get update && apt-get install -y --no-install-recommends docker.io && rm -rf /var/lib/apt/lists/* &&
             corepack enable &&
             corepack prepare pnpm@latest --activate &&
             pnpm install --frozen-lockfile &&
             pnpm --filter @clawix/shared build &&
             pnpm --filter @clawix/api exec prisma generate &&
             chown -R $(stat -c '%u:%g' /app/packages/api/prisma/schema.prisma) /app/packages/api/src/generated &&
             pnpm --filter @clawix/api exec prisma migrate deploy --schema=prisma/schema.prisma &&
             pnpm --filter @clawix/api exec node -e \"
               const { Client } = require('pg');
               const c = new Client({ connectionString: process.env.DATABASE_URL });
               c.connect()
                .then(() => c.query('SELECT count(*) FROM \\\"User\\\"'))
                .then(r => { c.end(); process.exit(Number(r.rows[0].count) > 0 ? 0 : 1); })
                .catch(() => { c.end(); process.exit(1); });
             \" || pnpm --filter @clawix/api exec prisma db seed &&
             pnpm --filter @clawix/api exec nest start --watch"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - clawix-internal
      - clawix-browser-egress

  web-server:
    image: node:22-slim
    container_name: clawix-web
    working_dir: /app
    ports:
      - '3000:3000'
    volumes:
      - ./packages/web/src:/app/packages/web/src
      - ./packages/web/public:/app/packages/web/public
      - ./packages/web/package.json:/app/packages/web/package.json
      - ./packages/web/tsconfig.json:/app/packages/web/tsconfig.json
      - ./packages/web/next.config.ts:/app/packages/web/next.config.ts
      - ./packages/web/postcss.config.mjs:/app/packages/web/postcss.config.mjs
      - ./packages/web/components.json:/app/packages/web/components.json
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/shared/package.json:/app/packages/shared/package.json
      - ./packages/shared/tsconfig.json:/app/packages/shared/tsconfig.json
      - ./package.json:/app/package.json
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - web_node_modules:/app/node_modules
      - web_pkg_node_modules:/app/packages/web/node_modules
      - shared_web_pkg_node_modules:/app/packages/shared/node_modules
    environment:
      PORT: '3000'
      HOST: '0.0.0.0'
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
    command: >
      sh -c "corepack enable &&
             corepack prepare pnpm@latest --activate &&
             pnpm install --frozen-lockfile &&
             pnpm --filter @clawix/shared build &&
             pnpm --filter @clawix/web dev"
    networks:
      - clawix-internal

  clawix-pypi-proxy:
    build:
      context: ./infra/docker/pypi-proxy
    container_name: clawix-pypi-proxy
    restart: unless-stopped
    environment:
      ALLOWLIST_FILE: /etc/clawix/python-allowlist.txt
    volumes:
      - clawix-pypi-cache:/home/devpi/server
      - ./infra/python-allowlist/extended.txt:/etc/clawix/python-allowlist.txt:ro
    networks:
      - clawix-internal
      - clawix-python-net-egress
    healthcheck:
      test: ['CMD', 'curl', '-fsSL', 'http://localhost:3141/+api']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  clawix-browser:
    image: ghcr.io/browserless/chromium:latest
    container_name: clawix-browser
    restart: unless-stopped
    user: '1000:1000'
    # Note: read_only: true breaks Chromium 1217+ — its crashpad handler
    # subprocess loses argv when the rootfs is read-only, causing
    # `chrome_crashpad_handler: --database is required` and aborting launch.
    # Other isolation (non-root user, cap_drop, no-new-privileges, internal
    # egress network, resource limits) still applies.
    cap_drop: [ALL]
    cap_add: [SYS_ADMIN]
    security_opt:
      - no-new-privileges
    mem_limit: 2g
    cpus: 2.0
    pids_limit: 200
    shm_size: 256m
    environment:
      MAX_CONCURRENT_SESSIONS: '${BROWSER_SIDECAR_MAX_SESSIONS:-25}'
      TOKEN: '${BROWSER_AUTH_TOKEN}'
      # Disable Browserless' built-in queue; we queue at the API layer.
      QUEUED: '0'
      HEALTHCHECK: 'true'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - "http://127.0.0.1:3000/active?token=$$TOKEN"']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - clawix-browser-egress
      - clawix-browser-net

  # ---- Optional: Google Workspace MCP sidecar (OAuth bearer-proxy mode) ----
  # Uncomment this service and set MCP_OAUTH_CALLBACK_URL + MCP_INTERNAL_ALLOWLIST
  # on api-server above, then import the server in Admin → MCP with authType=oauth.
  # clawix-gworkspace:
  #   image: ghcr.io/taylorwilsdon/google_workspace_mcp:latest
  #   environment:
  #     MCP_ENABLE_OAUTH21: 'true'
  #     EXTERNAL_OAUTH21_PROVIDER: 'true'
  #     WORKSPACE_MCP_STATELESS_MODE: 'true'
  #     GOOGLE_OAUTH_CLIENT_ID: '<your-google-oauth-client-id>'
  #     FASTMCP_SERVER_AUTH_GOOGLE_JWT_SIGNING_KEY: '<any-random-secret>'
  #     WORKSPACE_MCP_PORT: '8000'
  #   command: ['--transport', 'streamable-http', '--tools', 'gmail', 'drive', 'docs', 'sheets']
  #   networks:
  #     - clawix-internal

volumes:
  postgres_data:
  redis_data:
  api_node_modules:
  api_pkg_node_modules:
  shared_pkg_node_modules:
  web_node_modules:
  web_pkg_node_modules:
  shared_web_pkg_node_modules:
  clawix-pypi-cache:

networks:
  # `name:` pins the actual Docker network name, bypassing Compose's
  # `<project>_<network>` prefix. The API spawns sibling containers via the
  # host docker socket and attaches them by these exact names — without
  # pinning, attach fails with "network not found".
  clawix-internal:
    name: clawix-internal
    driver: bridge
  clawix-browser-egress:
    name: clawix-browser-egress
    driver: bridge
    internal: true # blocks traffic from this network to the host/internet
  clawix-browser-net:
    name: clawix-browser-net
    driver: bridge
    # External default: this network reaches the public internet by default.
    # RFC1918 blocking is enforced by the deploy environment's firewall rules
    # or a sidecar egress proxy. See docs/specs/2026-05-06-web-fetch-and-browser-tools-design.md §Egress.
  clawix-python-net-egress:
    name: clawix-python-net-egress
    driver: bridge
    internal: false
